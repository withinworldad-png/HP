<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>日本語文法学習 — With In World</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&family=Playfair+Display:wght@700&family=DM+Sans:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --navy: #1E3A6E;
    --blue: #2B5BA8;
    --blue-mid: #3A6FC5;
    --blue-light: #5B8DD9;
    --blue-pale: #D6E4F7;
    --blue-bg: #EEF4FC;
    --white: #FFFFFF;
    --off-white: #F5F8FE;
    --text-dark: #1a2a4a;
    --text-mid: #3a5080;
    --text-light: #7a9ac0;
    --yellow: #F5C842;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  html { scroll-behavior:smooth; }
  body {
    font-family:'Noto Sans JP','DM Sans',sans-serif;
    background:var(--white); color:var(--text-dark);
    overflow-x:hidden; min-height:100vh;
    display:flex; flex-direction:column;
  }

  /* NAV */
  .lang-bar {
    position:fixed; top:0; left:0; right:0; z-index:1000;
    background:rgba(255,255,255,0.94); backdrop-filter:blur(16px);
    border-bottom:1px solid var(--blue-pale);
    display:flex; align-items:center; justify-content:space-between;
    padding:0 40px; height:60px;
  }
  .logo-nav { font-family:'DM Sans',sans-serif; font-weight:700; font-size:1.3rem; color:var(--navy); text-decoration:none; }
  .logo-nav span { color:var(--blue-mid); }
  .nav-right { display:flex; align-items:center; gap:16px; }
  .back-btn { color:var(--text-mid); font-size:0.85rem; text-decoration:none; font-weight:500; transition:color 0.2s; }
  .back-btn:hover { color:var(--navy); }
  .lang-toggle { display:flex; gap:4px; background:var(--blue-bg); border-radius:20px; padding:3px; }
  .lang-btn { border:none; cursor:pointer; border-radius:16px; padding:5px 14px; font-size:0.8rem; font-weight:600; transition:all 0.2s; background:transparent; color:var(--text-mid); }
  .lang-btn.active { background:var(--navy); color:white; }

  /* MAIN */
  main {
    flex:1; display:flex; flex-direction:column;
    align-items:center; justify-content:center;
    padding:100px 40px 60px;
    background:linear-gradient(150deg, #f0f5ff 0%, var(--blue-bg) 50%, #ddeeff 100%);
    position:relative; overflow:hidden;
    text-align:center;
  }

  /* blobs */
  .blob { position:absolute; border-radius:50%; filter:blur(60px); pointer-events:none; }
  .blob-1 { width:400px; height:400px; background:radial-gradient(circle,rgba(43,91,168,0.15) 0%,transparent 70%); top:-80px; right:-80px; animation:blobA 9s ease-in-out infinite; }
  .blob-2 { width:300px; height:300px; background:radial-gradient(circle,rgba(91,141,217,0.12) 0%,transparent 70%); bottom:-60px; left:-60px; animation:blobB 7s ease-in-out infinite; }
  @keyframes blobA { 0%,100%{transform:translate(0,0)} 50%{transform:translate(-20px,15px)} }
  @keyframes blobB { 0%,100%{transform:translate(0,0)} 50%{transform:translate(15px,-20px)} }

  .coming-badge {
    display:inline-block;
    background:rgba(245,200,66,0.2); color:#7a5c00;
    border:1px solid rgba(245,200,66,0.5);
    font-size:0.72rem; font-weight:800; padding:6px 16px;
    border-radius:20px; margin-bottom:24px;
    letter-spacing:0.1em; text-transform:uppercase;
    animation:fadeInUp 0.6s ease both;
  }
  .page-title {
    font-family:'Playfair Display','Noto Sans JP',serif;
    font-size:clamp(2rem,5vw,3.8rem);
    color:var(--navy); line-height:1.2; margin-bottom:20px;
    animation:fadeInUp 0.6s 0.1s ease both;
  }
  .page-title .accent { color:var(--blue-mid); }
  .page-sub {
    font-size:1rem; color:var(--text-mid); line-height:1.9;
    font-weight:300; max-width:520px; margin-bottom:44px;
    animation:fadeInUp 0.6s 0.2s ease both;
  }
  .back-home {
    display:inline-block; text-decoration:none;
    background:var(--navy); color:white;
    padding:13px 30px; border-radius:26px;
    font-size:0.92rem; font-weight:700; font-family:inherit;
    transition:all 0.25s; box-shadow:0 4px 18px rgba(30,58,110,0.22);
    animation:fadeInUp 0.6s 0.3s ease both;
  }
  .back-home:hover { background:var(--blue); transform:translateY(-2px); box-shadow:0 8px 28px rgba(30,58,110,0.28); }

  @keyframes fadeInUp { from{opacity:0;transform:translateY(24px)} to{opacity:1;transform:translateY(0)} }

  footer { background:#0d1d40; padding:32px 40px; text-align:center; color:rgba(255,255,255,0.38); font-size:0.8rem; }
  .foot-logo { font-family:'DM Sans',sans-serif; font-size:1.1rem; font-weight:700; color:rgba(255,255,255,0.75); margin-bottom:8px; }
  .foot-logo span { color:var(--blue-light); }
</style>
</head>
<body>

<!-- NAV -->
<nav class="lang-bar">
  <a href="index.html" class="logo-nav">With In <span>World</span></a>
  <div class="nav-right">
    <a href="index.html" class="back-btn" data-ja="← ホームへ" data-en="← Home">← ホームへ</a>
    <div class="lang-toggle">
      <button class="lang-btn active" data-lang="ja">JP</button>
      <button class="lang-btn" data-lang="en">EN</button>
    </div>
  </div>
</nav>

<!-- MAIN -->
<main>
  <div class="blob blob-1"></div>
  <div class="blob blob-2"></div>

  <div class="coming-badge" data-ja="COMING SOON" data-en="COMING SOON">COMING SOON</div>
  <h1 class="page-title">
    <span data-ja="日本語文法学習" data-en="Japanese Grammar">日本語文法学習</span>
  </h1>
  <p class="page-sub" data-ja="このページは現在準備中です。詳細は近日公開予定です。しばらくお待ちください。" data-en="This page is currently under construction. Details will be available soon. Thank you for your patience.">このページは現在準備中です。詳細は近日公開予定です。しばらくお待ちください。</p>
  <a href="index.html" class="back-home" data-ja="← ホームに戻る" data-en="← Back to Home">← ホームに戻る</a>
</main>

<footer>
  <div class="foot-logo">With In <span>World</span></div>
  <p data-ja="「学びたい。」を我慢しない。" data-en="Don't hold back your desire to learn.">「学びたい。」を我慢しない。</p>
</footer>

<script>
  function applyLang(lang) {
    document.querySelectorAll('[data-ja]').forEach(el => {
      const t = el.getAttribute('data-' + lang);
      if (t) el.innerHTML = t;
    });
    document.querySelectorAll('.lang-btn').forEach(b => b.classList.toggle('active', b.dataset.lang === lang));
    document.documentElement.lang = lang === 'ja' ? 'ja' : 'en';
  }
  document.querySelectorAll('.lang-btn').forEach(b => b.addEventListener('click', () => applyLang(b.dataset.lang)));
</script>
</body>
</html>
